name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build --build-arg BUILD_ID=${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/vue-app:latest .

      - name: Push Docker image SHA
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}

      - name: Push Docker image latest
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-service-tp-note-linux
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}

      - name: Résumé profil
        run: |
          echo 'URL publique: https://app-service-tp-note-linux-fsfvcrb2dja0b6ag.norwayeast-01.azurewebsites.net' >> "$GITHUB_STEP_SUMMARY"